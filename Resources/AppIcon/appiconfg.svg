<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="lens" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.2"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
        </linearGradient>
    </defs>
    <!-- Magnifying glass lens -->
    <circle cx="195" cy="195" r="130" fill="url(#lens)" stroke="#ffffff" stroke-width="18"/>
    <!-- Fork tines -->
    <line x1="160" y1="120" x2="160" y2="170" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <line x1="175" y1="120" x2="175" y2="170" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <line x1="190" y1="120" x2="190" y2="170" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <!-- Fork handle -->
    <line x1="175" y1="170" x2="175" y2="250" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <!-- Spoon bowl -->
    <ellipse cx="230" cy="145" rx="18" ry="28" fill="none" stroke="#ffffff" stroke-width="9"/>
    <!-- Spoon handle -->
    <line x1="230" y1="173" x2="230" y2="260" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <!-- Magnifying glass handle -->
    <line x1="287" y1="287" x2="370" y2="370" stroke="#ffffff" stroke-width="22" stroke-linecap="round"/>
    <!-- Handle end cap -->
    <circle cx="370" cy="370" r="14" fill="#ffffff" opacity="0.5"/>
</svg>
